springdoc.swagger-ui.urlsPrimaryName=public
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/api/swagger-ui
springdoc.api-docs.path=/api/v3/api-docs
# Set the public HTTPS base URL for Swagger UI "Servers" on deployed tiers (omit for local dev).
springdoc.api-docs.server-url=http://localhost:8080
# When behind a reverse proxy, also enable forwarded headers so request-derived URLs use HTTPS:
#server.forward-headers-strategy=FRAMEWORK
